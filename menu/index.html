<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu | The Vintage Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  background:#0c0c0f;
  color:#fff;
}

/* ================= NAVBAR ================= */

.navbar{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 8%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:999;
  transition:.4s;
}

.navbar.scrolled{
  padding:14px 8%;
  background:#000;
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:22px;
  letter-spacing:2px;
}

.nav-links{
  display:flex;
  gap:30px;
  align-items:center;
}

.nav-links a{
  text-decoration:none;
  color:#fff;
  font-size:14px;
  transition:.3s;
}

.nav-links a:hover{
  color:#F4D06F;
}

.nav-btn{
  padding:10px 22px;
  background:#F4D06F;
  color:#000 !important;
  border-radius:30px;
  font-weight:600;
}

/* ================= HERO ================= */

.menu-hero{
  height:50vh;
  background:url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  margin-top:80px;
}

.menu-hero h1{
  font-family:'Playfair Display',serif;
  font-size:50px;
  letter-spacing:3px;
}

/* ================= CATEGORY TABS ================= */

.menu-tabs{
  text-align:center;
  margin:70px 0 40px;
}

.menu-tabs button{
  padding:10px 25px;
  margin:10px;
  border:none;
  background:#1a1a1f;
  color:#fff;
  border-radius:30px;
  cursor:pointer;
  transition:.3s;
}

.menu-tabs button.active,
.menu-tabs button:hover{
  background:#F4D06F;
  color:#000;
}

/* ================= MENU GRID ================= */

.menu-section{
  display:none;
  padding:0 8% 80px;
}

.menu-section.active{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
}

.menu-card{
  background:#141418;
  border-radius:16px;
  padding:20px;
  text-align:center;
  transition:.4s;
}

.menu-card:hover{
  transform:translateY(-6px);
}

.menu-card img{
  width:100px;
  height:100px;
  object-fit:cover;
  border-radius:50%;
  margin-bottom:15px;
}

.menu-card h3{
  font-family:'Playfair Display',serif;
  margin-bottom:10px;
}

.menu-card p{
  font-size:13px;
  opacity:.6;
  margin-bottom:10px;
}

.price{
  color:#F4D06F;
  font-weight:600;
}

/* ================= FOOTER ================= */

.footer{
  background:#0a0a0c;
  padding:80px 8%;
  text-align:center;
  border-top:1px solid rgba(244,208,111,0.2);
}

.footer h2{
  font-family:'Playfair Display',serif;
  margin-bottom:20px;
}

.footer p{
  opacity:.6;
  margin-bottom:20px;
}

.footer a{
  text-decoration:none;
  color:#F4D06F;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

  .nav-links{
    display:none;
  }

  .menu-hero h1{
    font-size:36px;
  }

}

</style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar" id="navbar">
  <div class="logo">THE VINTAGE</div>
  <div class="nav-links">
    <a href="../">Home</a>
    <a href="../reservation/">Reservation</a>
    <a href="../partyhall/">Party Hall</a>
    <a href="#" class="nav-btn">Menu</a>
  </div>
</div>

<!-- HERO -->
<section class="menu-hero">
  <h1>Our Menu</h1>
</section>

<!-- TABS -->
<div class="menu-tabs">
  <button class="tab-btn active" onclick="showMenu('breakfast',this)">Breakfast</button>
  <button class="tab-btn" onclick="showMenu('lunch',this)">Lunch</button>
  <button class="tab-btn" onclick="showMenu('dinner',this)">Dinner</button>
  <button class="tab-btn" onclick="showMenu('dessert',this)">Desserts</button>
  <button class="tab-btn" onclick="showMenu('drinks',this)">Drinks</button>
</div>

<!-- MENU SECTIONS -->

<div id="breakfast" class="menu-section active"></div>
<div id="lunch" class="menu-section"></div>
<div id="dinner" class="menu-section"></div>
<div id="dessert" class="menu-section"></div>
<div id="drinks" class="menu-section"></div>

<!-- FOOTER -->
<section class="footer">
  <h2>Experience Fine Dining in Hosur</h2>
  <p>Premium flavours • Elegant ambience • Unforgettable memories</p>
  <p>© 2026 The Vintage Restaurant & Party Hall</p>
</section>

<script>

/* Navbar scroll */
window.addEventListener("scroll",function(){
  document.getElementById("navbar").classList.toggle("scrolled",window.scrollY>50);
});

/* Dynamic Menu Data */

const menuData = {
  breakfast:["Pancakes","Omelette","French Toast","Idli & Sambar","Masala Dosa","Bagel","Paratha","Poha","Upma","Croissant"],
  lunch:["Veg Biryani","Chicken Biryani","Paneer Butter Masala","Dal Tadka","Butter Naan","Fried Rice","Grilled Chicken","Fish Curry","Veg Thali","Mutton Curry"],
  dinner:["Tandoori Chicken","Lasagna","Steak","Kebab Platter","Pizza","Pasta","Seafood Platter","Shawarma","BBQ Chicken","Cheese Burst Naan"],
  dessert:["Brownie","Ice Cream","Gulab Jamun","Cheesecake","Tiramisu","Chocolate Lava","Cupcakes","Rasmalai","Apple Pie","Donuts"],
  drinks:["Cold Coffee","Mocktail","Fresh Lime Soda","Mango Shake","Lassi","Green Tea","Cappuccino","Espresso","Soft Drinks","Mineral Water"]
};

function loadMenus(){
  for(const category in menuData){
    const section = document.getElementById(category);
    menuData[category].forEach(item=>{
      section.innerHTML += `
        <div class="menu-card">
          <img src="https://source.unsplash.com/100x100/?food" alt="">
          <h3>${item}</h3>
          <p>Deliciously prepared with premium ingredients.</p>
          <div class="price">₹299</div>
        </div>
      `;
    });
  }
}

function showMenu(category,btn){
  document.querySelectorAll(".menu-section").forEach(sec=>sec.classList.remove("active"));
  document.getElementById(category).classList.add("active");

  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

loadMenus();

</script>

</body>
</html>
